<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accès créateur — bientôt disponible · Univers MS</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #0a0a0a;
    color: #f5f5f5;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 32px;
    background: radial-gradient(ellipse at top, rgba(0,76,255,0.12), transparent 60%),
                radial-gradient(ellipse at bottom, rgba(0,245,160,0.08), transparent 60%),
                #0a0a0a;
  }
  .card {
    max-width: 520px;
    text-align: center;
    padding: 48px 32px;
  }
  .eyebrow {
    font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
    color: #00F5A0; font-weight: 600; margin-bottom: 20px;
  }
  h1 {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800; letter-spacing: -0.02em; line-height: 1.1;
    margin-bottom: 20px;
  }
  p {
    color: #b5b5b5; font-size: 16px; line-height: 1.55;
    margin-bottom: 16px;
  }
  a.btn {
    display: inline-block; margin-top: 28px;
    padding: 12px 26px; border-radius: 99px;
    background: #f5f5f5; color: #0a0a0a;
    font-weight: 600; text-decoration: none; font-size: 14px;
    transition: transform 0.15s;
  }
  a.btn:hover { transform: translateY(-1px); }
  .footer {
    margin-top: 32px; color: #7a7a7a; font-size: 12px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Univers MS</div>
    <h1>Accès créateur bientôt disponible</h1>
    <p>Le dashboard privé pour les producteurs et hôtes de l'univers Matthieu Stefani est en cours de finalisation (Phase E).</p>
    <p>Tu seras prévenu·e dès que l'accès est ouvert.</p>
    <a href="/" class="btn">← Retour à l'Univers</a>
    <div class="footer">Si tu penses que tu devrais déjà avoir accès, contacte Jeremy.</div>
  </div>
  <script defer src="/legal-bar.js"></script>
</body>
</html>
