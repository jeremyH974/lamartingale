<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion créateur · Univers MS</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #0a0a0a;
    color: #f5f5f5;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 32px;
    background: radial-gradient(ellipse at top, rgba(0,76,255,0.12), transparent 60%),
                radial-gradient(ellipse at bottom, rgba(0,245,160,0.08), transparent 60%),
                #0a0a0a;
  }
  .card {
    max-width: 480px; width: 100%;
    padding: 40px 32px;
    background: #121212;
    border: 1px solid #262626;
    border-radius: 16px;
  }
  .brand {
    display: flex; align-items: center; gap: 10px; margin-bottom: 28px;
  }
  .logo-mark {
    width: 28px; height: 28px; border-radius: 6px;
    background: conic-gradient(from 0deg, #004cff, #00F5A0, #f59e0b, #ef476f, #06d6a0, #004cff);
  }
  .brand-name { font-size: 16px; font-weight: 800; letter-spacing: -0.01em; }
  .eyebrow {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: #00F5A0; font-weight: 600; margin-bottom: 12px;
  }
  h1 {
    font-size: 26px; font-weight: 800; letter-spacing: -0.02em;
    line-height: 1.15; margin-bottom: 10px;
  }
  p.sub {
    color: #b5b5b5; font-size: 14px; line-height: 1.55; margin-bottom: 24px;
  }
  form { display: flex; flex-direction: column; gap: 14px; }
  label {
    font-size: 12px; color: #b5b5b5; font-weight: 500;
    display: block; margin-bottom: 6px;
  }
  input[type="email"] {
    width: 100%;
    padding: 12px 14px;
    background: #0a0a0a;
    border: 1px solid #262626;
    border-radius: 10px;
    color: #f5f5f5;
    font-family: inherit;
    font-size: 14px;
    transition: border-color 0.15s;
  }
  input[type="email"]:focus {
    outline: none; border-color: #00F5A0;
  }
  button[type="submit"] {
    padding: 12px 22px;
    background: #f5f5f5;
    color: #0a0a0a;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.15s;
  }
  button[type="submit"]:hover { transform: translateY(-1px); }
  button[type="submit"]:disabled { opacity: 0.5; cursor: wait; transform: none; }
  .msg {
    padding: 14px 16px; border-radius: 10px;
    font-size: 13px; line-height: 1.5;
    margin-top: 6px;
  }
  .msg.ok {
    background: rgba(0,245,160,0.08);
    border: 1px solid rgba(0,245,160,0.3);
    color: #7cffc8;
  }
  .msg.err {
    background: rgba(239,71,111,0.08);
    border: 1px solid rgba(239,71,111,0.3);
    color: #ffb3c1;
  }
  .msg a { color: inherit; text-decoration: underline; }
  .footer {
    margin-top: 28px; padding-top: 20px;
    border-top: 1px solid #262626;
    color: #7a7a7a; font-size: 12px; line-height: 1.55;
  }
  .footer a { color: #b5b5b5; text-decoration: none; }
  .footer a:hover { color: #f5f5f5; }
  code {
    background: #0a0a0a; padding: 1px 6px;
    border-radius: 4px; font-size: 12px;
    border: 1px solid #262626;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo-mark"></div>
      <div class="brand-name">Univers<strong style="font-weight:900">MS</strong></div>
    </div>

    <div class="eyebrow">Accès créateur</div>
    <h1>Connexion par magic-link</h1>
    <p class="sub">Entre ton email pour recevoir un lien de connexion. Aucun mot de passe — le lien expire au bout de 15 minutes.</p>

    <div id="error-banner"></div>

    <form id="login-form" autocomplete="on">
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email"
               placeholder="prenom@exemple.fr" spellcheck="false">
      </div>
      <button type="submit" id="submit-btn">Envoyer le lien</button>
    </form>

    <div id="result-msg"></div>

    <div class="footer">
      Tu n'as pas d'accès ? Contacte Jeremy.<br>
      <a href="/">← Retour à l'Univers</a>
    </div>
  </div>

<script>
(() => {
  const form = document.getElementById('login-form');
  const submitBtn = document.getElementById('submit-btn');
  const emailInput = document.getElementById('email');
  const resultMsg = document.getElementById('result-msg');
  const errorBanner = document.getElementById('error-banner');

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Affiche erreur depuis ?error=... (callback /auth/consume → redirect here)
  const params = new URLSearchParams(window.location.search);
  const errCode = params.get('error');
  if (errCode === 'invalid_or_expired_token') {
    errorBanner.innerHTML = `<div class="msg err"><strong>Lien invalide ou expiré.</strong><br>Les magic-links sont à usage unique et expirent sous 15 minutes. Demande-en un nouveau ci-dessous.</div>`;
  } else if (errCode === 'no_access') {
    errorBanner.innerHTML = `<div class="msg err"><strong>Accès non autorisé.</strong><br>Cet email n'a pas d'accès au hub créateur. Si tu penses que c'est une erreur, contacte Jeremy.</div>`;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = emailInput.value.trim();
    if (!email) return;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Envoi en cours…';
    resultMsg.innerHTML = '';

    try {
      const resp = await fetch('/api/auth/request-link', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        const err = data?.error || `HTTP ${resp.status}`;
        if (err === 'invalid_email') {
          resultMsg.innerHTML = `<div class="msg err">Email invalide.</div>`;
        } else {
          resultMsg.innerHTML = `<div class="msg err">Erreur : ${esc(err)}</div>`;
        }
        submitBtn.disabled = false;
        submitBtn.textContent = 'Envoyer le lien';
        return;
      }
      // Message neutre (pas d'énumération).
      let html = `<div class="msg ok"><strong>Si cet email a un accès, un lien de connexion vient d'être envoyé.</strong><br>Vérifie ta boîte de réception (et tes spams).</div>`;
      if (data.dev_link) {
        html += `<div class="msg ok" style="margin-top:8px"><strong>Mode dev :</strong> <a href="${esc(data.dev_link)}">Cliquer pour se connecter</a></div>`;
      }
      resultMsg.innerHTML = html;
      submitBtn.textContent = 'Lien envoyé ✓';
      // Re-enable après 3s pour permettre de renvoyer si besoin.
      setTimeout(() => {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Renvoyer le lien';
      }, 3000);
    } catch (err) {
      resultMsg.innerHTML = `<div class="msg err">Erreur réseau : ${esc(err.message)}</div>`;
      submitBtn.disabled = false;
      submitBtn.textContent = 'Envoyer le lien';
    }
  });
})();
</script>
</body>
</html>
